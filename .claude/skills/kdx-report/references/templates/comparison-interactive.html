pre, code { font-family: var(--font-mono); font-size: 0.94rem; }

.diff .add { display: block; background: var(--diff-add-bg); color: var(--diff-add-fg); margin: 0 -16px; padding: 0 16px; }
.diff .del { display: block; background: var(--diff-del-bg); color: var(--diff-del-fg); margin: 0 -16px; padding: 0 16px; }
.diff .add::before { content: '+ '; opacity: 0.6; }
.diff .del::before { content: '- '; opacity: 0.6; }

width: 100vw;
margin-inline: calc(50% - 50vw);
padding: 0;
margin-block: 2rem 3rem;
background: none;
border: none;
overflow-x: auto;
overflow-y: visible; -webkit-overflow-scrolling: touch;
scrollbar-width: thin;
scrollbar-color: var(--orange-deep) transparent; }
.diagram::-webkit-scrollbar { height: 3px; }
.diagram::-webkit-scrollbar-track { background: transparent; }
.diagram::-webkit-scrollbar-thumb { background: var(--orange-deep); border-radius: var(--radius-pill); }
.diagram .mermaid, .diagram pre.mermaid {
display: flex; justify-content: center; min-width: min-content;
background: none; border: none; padding: 0 1rem; margin: 0; }
.diagram svg { display: block; max-width: none !important; background: transparent !important; min-height: var(--mermaid-min-h); }
.diagram svg .background, .diagram foreignObject div { background: transparent !important; }
.diagram .labelBkg { background: transparent !important; }
.diagram .edgeLabel, .diagram span.edgeLabel, .diagram .edgeLabel p { background-color: var(--ink-900) !important; color: var(--warm-200) !important; }
.diagram .edgeLabel rect, .diagram .edgeLabels rect { fill: var(--ink-900) !important; opacity: 1 !important; }
.diagram .edgeLabel span, .diagram .edgeLabel text, .diagram .edgeLabel tspan { color: var(--warm-200) !important; fill: var(--warm-200) !important; }
.figure { margin: 0 0 16px; border: var(--hairline); border-radius: var(--radius-lg); overflow: hidden; background: var(--ink-1000); position: relative; }
.figure img { display: block; width: 100%; height: auto; }
.figure figcaption { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.04em; color: var(--ink-500); padding: 10px 14px; border-top: var(--hairline); display: flex; gap: 8px; align-items: center; }
.figure--veil::after { content: ""; position: absolute; inset: 0; background: radial-gradient(120% 80% at 80% 0, rgba(255,106,26,.16), transparent 60%); mix-blend-mode: soft-light; pointer-events: none; }
.image-slot { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; min-height: 160px; border: 1.5px dashed var(--ink-600); border-radius: var(--radius-lg); color: var(--ink-500); font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; padding: 24px; margin: 0 0 16px; }
.image-slot .icon { width: 2rem; height: 2rem; stroke: var(--ink-500); }

@media (prefers-reduced-motion: no-preference) {
.rise { opacity: 0; transform: translateY(18px); animation: rise var(--dur-slow) var(--ease-settle) forwards; }
.d1 { animation-delay: 80ms; } .d2 { animation-delay: 200ms; }
.d3 { animation-delay: 320ms; } .d4 { animation-delay: 440ms; } .d5 { animation-delay: 560ms; }
@keyframes rise { to { opacity: 1; transform: none; } } }

body{max-width:660px;font-size:17px;padding:4rem 2.5rem 6rem}

.po-glow{background:radial-gradient(52% 40% at 82% 8%,rgba(255,106,26,.20) 0%,rgba(255,106,26,.06) 42%,transparent 72%)} }
.compare-nav {
position: sticky;
top: 0;
z-index: 10;
display: flex;
flex-wrap: wrap;
gap: 8px;
padding: 12px 0 16px;
margin: 0 0 8px;
background: linear-gradient(180deg, var(--ink-1000) 75%, transparent); }

touch-action: manipulation; }
.compare-tab.is-active { font-weight: 800; }
.compare-tab.is-active[data-compare="both"] { border-color: var(--cream-100); color: var(--cream-100); }
.compare-tab.is-active[data-compare="grok"] { border-color: var(--orange-500); color: var(--orange-400); }

</head>
<body>
<div class="po-glow"></div>

<!-- SHARED: hero -->
<section data-compare-panel="shared" class="rise d1">
  <p class="kicker">comparación · {{DOMAIN}}</p>
  <h1>{{TITLE}}</h1>
  <p>{{HOOK}}</p>
  <div class="chips">
    <span class="chip work">{{SIDE_A_LABEL}}</span>
    <span class="chip stop">{{SIDE_B_LABEL}}</span>
  </div>
</section>

<!-- SHARED: tab nav — place immediately after hero -->
<nav class="compare-nav" role="tablist" aria-label="comparar">
  <button type="button" class="compare-tab is-active" role="tab" data-compare="both" aria-selected="true">ambos</button>
  <button type="button" class="compare-tab" role="tab" data-compare="grok" aria-selected="false">{{SIDE_A_TAB}}</button>
  <button type="button" class="compare-tab" role="tab" data-compare="kodex" aria-selected="false">{{SIDE_B_TAB}}</button>
  <button type="button" class="compare-tab" role="tab" data-compare="contrast" aria-selected="false">contraste</button>
</nav>

<!-- CONTRAST: side-by-side summary rows (abbreviated — no duplicate full mermaid) -->
<section data-compare-panel="contrast" class="rise d2">
  <p class="kicker"><span class="num">↔</span> · contraste rápido</p>
  <div class="compare-row">
    <div class="compare-col compare-col--a">
      <span class="compare-col-label">{{SIDE_A_LABEL}}</span>
      <h3>{{CONTRAST_A_1_TITLE}}</h3>
      <p>{{CONTRAST_A_1_BODY}}</p>
    </div>
    <div class="compare-col compare-col--b">
      <span class="compare-col-label">{{SIDE_B_LABEL}}</span>
      <h3>{{CONTRAST_B_1_TITLE}}</h3>
      <p>{{CONTRAST_B_1_BODY}}</p>
    </div>
  </div>
</section>

<!-- SIDE A: full sections -->
<section data-compare-panel="grok" class="rise d3">
  <p class="kicker"><span class="num">A</span> · {{SIDE_A_LABEL}}</p>
  <!-- fill with cards + mermaid -->
</section>

<!-- SIDE B: full sections -->
<section data-compare-panel="kodex" class="rise d4">
  <p class="kicker"><span class="num">B</span> · {{SIDE_B_LABEL}}</p>
  <!-- fill with cards + mermaid -->
</section>

<!-- SHARED: footer -->
<p data-compare-panel="shared" class="beat">{{DATE}} · {{TITLE}}</p>

<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({ startOnLoad: false, securityLevel: 'loose' });
  mermaid.run().then(() => {
    const MIN_H = 800; /* px — same minimum legible height for every diagram */
    document.querySelectorAll('.diagram svg').forEach(svg => {
      const vb = svg.viewBox && svg.viewBox.baseVal;
      if (!vb || !vb.height) return;
      const k = Math.max(1, MIN_H / vb.height); /* upscale-only: never shrink a shape */
      svg.style.width = (vb.width * k) + 'px';
      svg.style.height = (vb.height * k) + 'px';
      svg.style.maxWidth = 'none';
    });
  });
</script>
<script>
(function () {
  var VIS = {
    both:     { shared: 1, grok: 1, kodex: 1, contrast: 0 },
    grok:     { shared: 1, grok: 1, kodex: 0, contrast: 0 },
    kodex:    { shared: 1, grok: 0, kodex: 1, contrast: 0 },
    contrast: { shared: 1, grok: 0, kodex: 0, contrast: 1 }
  };
  var nav = document.querySelector('.compare-nav');
  if (!nav) return;
  var tabs = nav.querySelectorAll('.compare-tab');
  var panels = document.querySelectorAll('[data-compare-panel]');
  var KEY = 'kdx-compare-mode';
  function setMode(mode) {
    if (!VIS[mode]) mode = 'both';
    tabs.forEach(function (t) {
      var on = t.getAttribute('data-compare') === mode;
      t.classList.toggle('is-active', on);
      t.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    panels.forEach(function (p) {
      var side = p.getAttribute('data-compare-panel');
      p.hidden = !VIS[mode][side];
    });
    try { sessionStorage.setItem(KEY, mode); } catch (e) {}
  }
  tabs.forEach(function (t) {
    t.addEventListener('click', function () { setMode(t.getAttribute('data-compare')); });
  });
  var saved = null;
  try { saved = sessionStorage.getItem(KEY); } catch (e) {}
  setMode(saved && VIS[saved] ? saved : 'both');
})();
</script>
</body>
